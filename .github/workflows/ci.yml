name: QA Test Harness CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  schedule:
    - cron: "0 10 * * *" # nightly at 10:00 UTC

permissions:
  contents: read

jobs:
  pr-checks:
    name: PR - lint/type/smoke (ubuntu, py${{ matrix.python-version }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install ruff mypy pytest-html

      - name: Lint(ruff)
        run: python -m ruff check .

      - name: Type check (mypy)
        run: python -m mypy src

      - name: Smoke tests
        run: |
          mkdir -p artifacts
          python -m pytest -m smoke \
            --junitxml=artifacts/junit-smoke.xml \
            --html=artifacts/smoke.html \
            --self-contained-html

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-artifacts
          path: artifacts

  main_system:
    name: Main - lint/type/system (${{ matrix.os }}, py${{ matrix.python-version }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install ruff mypy pytest-html

      - name: Lint(ruff)
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy src

      - name: System tests (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          python -m pytest -m system \
            --junitxml=artifacts/junit-system-${{ matrix.os }}-py${{matrix.python-version }}.xml \
            --html=artifacts/system-${{ matrix.os }}-py${{ matrix.python-version }}.html \
            --self-contained-html

      - name: System tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          python -m pytest -m system `
            --junitxml=artifacts/junit-system-${{ matrix.os }}-py${{ matrix.python-version }}.xml `
            --html=artifacts/system-${{ matrix.os }}-py${{ matrix.python-version }}.html `
            --self-contained-html

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-${{ matrix.os }}-py${{ matrix.python-version }}
          path: artifacts/

      - name: Upload test metrics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf_metrics-${{ matrix.python-version }}
          path: |
            artifacts/metrics/
            artifacts/metrics_summary.json

  main-e2e:
    name: Main - Playwright E2E (ubuntu)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps(includes uvicorn)
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/

  perf-envelope:
    name: Perf Envelope (ubuntu, py3.11)
    if: github.even_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[test]"
          python -m pip install pytest-html

      - name: Run performance envelope tests
        env:
          # combined test tuneables
          PERF_COMBINED_SAMPLES: "40"
          PERF_COMBINED_DROP_RATE: "0.20"
          PERF_COMBINED_DELAY_MS: "80"
          PERF_COMBINED_MIN_SUCCESS_RATE: "0.80"
          PERF_COMBINED_p50_MIN_MS: "70"
          PERF_COMBINED_P95_MAX_MS: "900"

          # drop-only test tunables
          PERF_DROP_SAMPLES: "30"
          PERF_DORP_RATE: "0.35"
          PERF_DROP_MIN_SUCCESS_RATE: "0.85"
          PERF_DROP_P95_MAX_MS: "600"

          # retry policy tunables (shared style)
          PERF_COMBINED_RETRY_ATTEMPTS: "4"
          PERF_COMBINED_RETRY_INITIAL_BACKOFF_S: "0.02"
          PERF_COMBINED_RETRY_MAX_BACKOFF_S: "0.10"
          PERF_COMBINED_RETRY_MULTIPLIER: "2.0"
          PERF_COMBINED_RETRY_JITTER_RATIO: "0.10"

          PERF_DROP_RETRY_ATTEMPTS: "4"
          PERF_DROP_RETRY_INITIAL_BACKOFF_S: "0.02"
          PERF_DROP_RETRY_MAX_BACKOFF_S: "0.10"
          PERF_DROP_RETRY_MULTIPLIER: "2.0"
          PERF_DROP_RETRY_JITTER_RATIO: "0.10"

        run: |
          mkdir -p artifacts
          python -m pytest tests/system/test_performance_envelope.py \
            --junitxml=artifacts/junit-perf.xml \
            --html=artifacts/perf.html \
            --self-contained-html
            
      - name: Upload perf metrics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf_metrics
          path: |
            artifacts/metrics/
            artifacts/metrics_summary.json
    
  nightly:
    name: Nightly - full regression (ubuntu, py3.11)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install ruff mypy pytest-html

      - name: Lint + type
        run: |
          python -m ruff check .
          python -m mypy src

      - name: Full test suite
        run: |
          mkdir -p artifacts
          python -m pytest \
            --junitxml=artifacts/junit-all.xml \
            --html=artifacts/all.html \
            --self-contained-html

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-artifacts
          path: artifacts/
